name: CI

# Pipeline: lint → typecheck → unit-tests → e2e-tests → build → deploy-check
#
# Deployment strategy:
#   Railway is connected to this GitHub repository and automatically deploys
#   on every push to master (Git-based deployment, no manual trigger needed).
#   The deploy-check job verifies the production URL is healthy after deployment.
#   See: https://docs.railway.app/guides/github-autodeploy

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)['total']
          for k in ['lines','statements','functions','branches']:
              pct = d[k]['pct']
              bar = '█' * int(pct // 10) + '░' * (10 - int(pct // 10))
              print(f'{k:12s} {bar} {pct:.1f}%')
          " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi


  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true


  build:
    name: Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Check build output
        run: ls -la .next/

  deploy-check:
    name: Deployment Health Check
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Wait for Railway deployment
        run: sleep 30

      - name: Health check — /api/health endpoint
        id: health
        run: |
          RAILWAY_URL="${{ secrets.RAILWAY_PUBLIC_URL }}"
          if [ -z "$RAILWAY_URL" ]; then
            echo "::warning::RAILWAY_PUBLIC_URL secret not set — skipping health check"
            exit 0
          fi
          echo "Checking $RAILWAY_URL/api/health ..."
          RESPONSE=$(curl -sf --max-time 15 "$RAILWAY_URL/api/health" 2>/dev/null || echo "FAILED")
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ Production is healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Health check failed — production may need rollback"
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Print rollback instructions on failure
        if: failure() && steps.health.outputs.healthy == 'false'
        run: |
          echo "### ⚠️ Deployment Health Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production health check returned non-OK response." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Rollback steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Open Railway dashboard → ChromaLens service" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to Deployments tab → find last stable deployment" >> $GITHUB_STEP_SUMMARY
          echo "3. Click ··· → Rollback to this deployment" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify \`/api/health\` returns \`{\"status\":\"ok\"}\` after rollback" >> $GITHUB_STEP_SUMMARY
